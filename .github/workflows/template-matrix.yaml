name: Template matrix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      uv-version: ${{ steps.uv-pin.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: uv-pin
        name: Resolve uv pin from template pyproject
        run: |
          version=$(sed -nE 's/^required-version = "==([^"]+)".*/\1/p' 'template/pyproject.toml.jinja')
          if [ -z "${version}" ]; then
            echo "Could not resolve uv pin from template/pyproject.toml.jinja" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ${{ steps.uv-pin.outputs.version }}
      - id: gen
        env:
          PYTHONPATH: .
        run: |
          matrix=$(uvx --from invoke --with coloredlogs invoke --search-root _CI test.list-combos --as-json)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  invariants:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ${{ needs.plan.outputs.uv-version }}
      - env:
          PYTHONPATH: .
        run: uvx --from invoke --with coloredlogs invoke --search-root _CI test.invariants

  run:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: ${{ matrix.combo.label }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ${{ needs.plan.outputs.uv-version }}
      - env:
          PYTHONPATH: .
        run: |
          uvx --from invoke --with coloredlogs invoke --search-root _CI test.combo \
            --git-hosting-service ${{ matrix.combo.git_hosting_service }} \
            ${{ matrix.combo.integrate_dependency_track && '' || '--no-integrate-dependency-track' }} \
            ${{ matrix.combo.integrate_pages && '' || '--no-integrate-pages' }}
