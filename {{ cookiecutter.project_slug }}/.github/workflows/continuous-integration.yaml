name: Continuous Integration

on:
  push:

jobs:
  build-deps-image:
    name: Build dependency image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      {#- Escape curly braces for Cookiecutter. -#}
      {%- raw %}
      image: ${{ steps.build.outputs.image }}
      {%- endraw %}

    steps:
      - name: Checkout repository
        uses: ./.github/actions/checkout

      - name: Build deps image
        id: build
        uses: ./.github/actions/build-deps-image

  ci:
    name: Continuous Integration
    needs: build-deps-image
    runs-on: ubuntu-latest
    container:
      {#- Escape curly braces for Cookiecutter. -#}
      {%- raw %}
      image: ${{ needs.build-deps-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      {%- endraw %}

    steps:
      - name: Checkout repository
        uses: ./.github/actions/checkout

      - name: Lint code
        run: ./workflow.cmd lint

      - name: Run tests
        run: ./workflow.cmd test

      - name: Build package
        run: ./workflow.cmd build
