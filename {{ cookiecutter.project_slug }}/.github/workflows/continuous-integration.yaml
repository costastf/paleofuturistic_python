name: Continuous Integration

on:
  push:

jobs:
  build-deps-image:
    name: Build dependency image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      {#- Escape curly braces for Cookiecutter. -#}
      {%- raw %}
      image: ${{ steps.deps.outputs.image }}
      {%- endraw %}

    steps:
      - name: Checkout repository
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Publish deps image
        id: deps
        run: |
          ./workflow.cmd container publish
          echo "image=$(cat .deps-image)" >> "$GITHUB_OUTPUT"

  ci:
    name: Continuous Integration
    needs: build-deps-image
    runs-on: ubuntu-latest
    container:
      {#- Escape curly braces for Cookiecutter. -#}
      {%- raw %}
      image: ${{ needs.build-deps-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      {%- endraw %}

    steps:
      - name: Checkout repository
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Lint code
        run: ./workflow.cmd lint

      - name: Run tests
        run: ./workflow.cmd test

      - name: Build package
        run: ./workflow.cmd build
