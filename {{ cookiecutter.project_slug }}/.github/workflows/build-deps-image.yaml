name: Build dependency image

on:
  workflow_call:
    outputs:
      image:
        description: Dependency image reference
        {#- Escape curly braces for Cookiecutter. -#}
        {%- raw %}
        value: ${{ jobs.build-deps-image.outputs.image }}
        {%- endraw %}

jobs:
  build-deps-image:
    name: Build dependency image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      {#- Escape curly braces for Cookiecutter. -#}
      {%- raw %}
      image: ${{ steps.deps.outputs.image }}
      {%- endraw %}

    steps:
      - name: Checkout repository
        {#- Escape curly braces for Cookiecutter. -#}
        {%- raw %}
        if: ${{ !env.ACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        {%- endraw %}
        run: |
          git init -b main
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Read uv version
        id: uv
        run: echo "version=$(./workflow.cmd info.uv-version)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        {#- Escape curly braces for Cookiecutter. -#}
        {%- raw %}
        if: ${{ !env.ACT }}
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true
        {%- endraw %}

      - name: Publish deps image
        id: deps
        {#- Escape curly braces for Cookiecutter. -#}
        {%- raw %}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        {%- endraw %}
        run: |
          ./workflow.cmd container.publish
          echo "image=$(cat .deps-image)" >> "$GITHUB_OUTPUT"

      - name: Minimize uv cache
        run: uv cache prune --ci
