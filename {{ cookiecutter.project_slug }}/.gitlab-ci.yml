stages:
  - deps
  - ci
  - publish

# Pipeline seed: GitLab cannot evaluate `image:` from pyproject at pipeline-creation time.
# Keep UV_ALPINE_IMAGE aligned with [tool.docker-versions].alpine-image in pyproject.toml.
variables:
  UV_ALPINE_IMAGE: "ghcr.io/astral-sh/uv:0.11.1-alpine3.20"
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

build-deps-image:
  stage: deps
  image: $UV_ALPINE_IMAGE
  variables:
    BUILDAH_ISOLATION: chroot
    STORAGE_DRIVER: vfs
    UV_NO_SYNC: "1"
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
  before_script:
    - apk add --no-cache bash buildah git
    - uv sync --no-dev
  script:
    - ./workflow.cmd container.publish
    - echo "DEPS_IMAGE=$(cat .deps-image)" > .deps-image.env
  after_script:
    - uv cache prune --ci
  artifacts:
    reports:
      dotenv: .deps-image.env

lint:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd lint

{%- for version in cookiecutter._known_python_versions %}
{%- if version >= cookiecutter.min_python_version and version <= cookiecutter.max_python_version %}

test-{{ version }}:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - uv run --python {{ version }} pytest
{%- endif %}
{%- endfor %}

build:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd build

publish:
  stage: publish
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment: pypi
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd release.publish
