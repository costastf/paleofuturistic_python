stages:
  - deps
  - ci
  - publish

variables:
  # Pipeline seed: bootstrapping uv inside kaniko:debug happens before any
  # workflow command can run (no python/uv on the image yet). Keep this
  # aligned with [tool.uv] required-version in pyproject.toml.
  UV_VERSION: "0.11.6"
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

build-deps-image:
  stage: deps
  # kaniko:debug ships a busybox shell and the kaniko executor — no docker
  # daemon, no user namespaces, so it works on restricted GitLab runners.
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    INVOKE_SHELL: /bin/sh
    # Force uv to use its managed musl Python build (kaniko:debug has no glibc).
    UV_PYTHON: cpython-3.13-linux-x86_64-musl
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
  before_script:
    - wget -qO- "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-x86_64-unknown-linux-musl.tar.gz" | tar -xzf -
    - export PATH="$(pwd)/uv-x86_64-unknown-linux-musl:$PATH"
    - uv sync --no-dev
  script:
    - ./workflow.cmd container.publish
    - echo "DEPS_IMAGE=$(cat .deps-image)" > .deps-image.env
  after_script:
    - uv cache prune --ci
  artifacts:
    reports:
      dotenv: .deps-image.env

lint:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd lint

test:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd test.tox

build:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd build

publish:
  stage: publish
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment: pypi
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd release.publish
