stages:
  - deps
  - ci
  - publish

build-deps-image:
  stage: deps
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    INVOKE_SHELL: /bin/sh
  before_script:
    - wget -qO- https://github.com/astral-sh/uv/releases/download/0.11.1/uv-x86_64-unknown-linux-musl.tar.gz | tar -xzf -
    - export PATH="$(pwd)/uv-x86_64-unknown-linux-musl:$PATH"
  script:
    - uv run --no-dev python _CI/lib/vendor/bin/invoke --search-root _CI container.publish
    - echo "DEPS_IMAGE=$(cat .deps-image)" > .deps-image.env
  artifacts:
    reports:
      dotenv: .deps-image.env

lint:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd lint

{%- for version in cookiecutter._known_python_versions %}
{%- if version >= cookiecutter.min_python_version and version <= cookiecutter.max_python_version %}

test-{{ version }}:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - uv run --python {{ version }} pytest
{%- endif %}
{%- endfor %}

build:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd build

publish:
  stage: publish
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment: pypi
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd release.publish
