stages:
  - deps
  - ci
  - publish

variables:
  # Recommended by uv's GitLab guide — hardlinks can't span GitLab's mount
  # boundaries, so downstream jobs that run `uv run` need copy mode.
  UV_LINK_MODE: copy

build-deps-image:
  stage: deps
  # kaniko:debug has no python/uv and its busybox binaries are static, which
  # uv's libc probe refuses. This is the one pipeline job that can't go
  # through ./workflow.cmd — the container.publish steps are inlined here so
  # the bootstrap needs nothing beyond kaniko + busybox. Every other job
  # runs inside $DEPS_IMAGE (built here) where ./workflow.cmd works normally.
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - TAG=$(sha256sum uv.lock | cut -c1-16)
    # GitLab only accepts pushes to $CI_REGISTRY_IMAGE or subpaths under it —
    # the -deps suffix convention ghcr.io uses would resolve to a separate
    # (unauthorised) project path, hence /deps.
    - IMAGE="${CI_REGISTRY_IMAGE}/deps:${TAG}"
    - BASE_IMAGE=$(sed -n 's/^base-image = "\(.*\)"$/\1/p' pyproject.toml)
    - mkdir -p /kaniko/.docker
    # GitLab's documented kaniko auth format uses username/password fields
    # (the combined `auth` base64 field triggers 401 on SBP's registry).
    - printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" > /kaniko/.docker/config.json
    - /kaniko/executor --dockerfile=Dockerfile.deps --context=. --destination="$IMAGE" --build-arg=BASE_IMAGE="$BASE_IMAGE"
    - echo "DEPS_IMAGE=$IMAGE" > .deps-image.env
  artifacts:
    reports:
      dotenv: .deps-image.env

lint:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd lint

test:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd test.tox

build:
  stage: ci
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd build

publish:
  stage: publish
  image: $DEPS_IMAGE
  needs:
    - job: build-deps-image
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment: pypi
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - ./workflow.cmd release.publish
